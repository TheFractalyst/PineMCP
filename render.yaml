# render.yaml — Render.com deployment configuration
# ─────────────────────────────────────────────────────────────────────────────
# Deploy PineScript MCP as a persistent web service on Render.
#
# IMPORTANT before deploying:
#   1. The pinescript_db/ directory must be included (it's the ChromaDB store).
#      Either bake it into the Docker image (Dockerfile does this by default)
#      OR mount a Render disk and set PINESCRIPT_DB_PATH to the mount path.
#   2. The sentence-transformers model (all-MiniLM-L6-v2) is downloaded on
#      first startup. Use a Render disk or pre-bake into image to avoid re-download.
# ─────────────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: pinescript-mcp
    runtime: docker
    dockerfilePath: ./Dockerfile

    # Render injects PORT automatically; server.py reads it via env var
    plan: starter  # upgrade to standard for more RAM (model needs ~500MB)

    healthCheckPath: /health

    envVars:
      - key: TRANSPORT
        value: http
      - key: HOST
        value: 0.0.0.0
      - key: LAZY_MODEL
        value: "true"
      - key: PINESCRIPT_COLLECTION
        value: pinescript_v6
      - key: PINESCRIPT_EMBED_MODEL
        value: all-MiniLM-L6-v2
      - key: PINESCRIPT_MAX_RESULTS
        value: "20"
      - key: PINE_FACADE_TIMEOUT
        value: "20"
      - key: VALIDATION_CACHE_TTL
        value: "300"
      - key: HOT_CACHE_NAMESPACES
        value: "ta,strategy,math,array,str,matrix,map"
      - key: LOG_LEVEL
        value: INFO
      # PINESCRIPT_DB_PATH: defaults to /app/pinescript_db (baked in image)
      # Override if using a mounted disk:
      # - key: PINESCRIPT_DB_PATH
      #   value: /data/pinescript_db
