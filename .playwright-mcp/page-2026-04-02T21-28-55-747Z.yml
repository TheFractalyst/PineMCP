                - generic [ref=e21459]: Requests economic data for a symbol. Economic data includes information such as the state of a country's economy (GDP, inflation rate, etc.) or of a particular industry (steel production, ICU beds, etc.).
                - generic [ref=e21460]: Syntax
                - generic [ref=e21461]: request.economic(country_code, field, gaps, ignore_invalid_symbol) → series float
                - generic [ref=e21462]: Arguments
                - generic [ref=e21463]:
                  - text: country_code (series string) The code of the country (e.g. "US") or the region (e.g. "EU") for which the economic data is requested. The
