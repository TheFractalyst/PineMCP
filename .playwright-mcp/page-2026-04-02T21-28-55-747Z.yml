                    - /url: https://www.tradingview.com/chart/?solution=43000665359
                  - text: lists the countries and their codes. The countries for which information is available vary with metrics. The
                  - link "Help Center article for each metric" [ref=e21465] [cursor=pointer]:
                    - /url: https://www.tradingview.com/support/folders/43000581956-list-of-available-economic-indicators/
                  - text: lists the countries for which the metric is available.
                - generic [ref=e21466]:
                  - text: field (series string) The code of the requested economic metric (e.g., "GDP"). The
                  - link "Help Center article" [ref=e21467] [cursor=pointer]:
                    - /url: https://www.tradingview.com/chart/?solution=43000665359
                  - text: lists the metrics and their codes.
                - generic [ref=e21468]:
                  - text: "gaps (simple barmerge_gaps) Specifies how the returned values are merged on chart bars. Possible values:"
                  - link "barmerge.gaps_off" [ref=e21469] [cursor=pointer]:
                    - /url: "#const_barmerge.gaps_off"
                  - text: ","
                  - link "barmerge.gaps_on" [ref=e21470] [cursor=pointer]:
                    - /url: "#const_barmerge.gaps_on"
                  - text: . With
                  - link "barmerge.gaps_on" [ref=e21471] [cursor=pointer]:
                    - /url: "#const_barmerge.gaps_on"
                  - text: ", a value only appears on the current chart bar when it first becomes available from the function's context, otherwise"
                  - link "na" [ref=e21472] [cursor=pointer]:
                    - /url: "#var_na"
                  - text: is returned (thus a "gap" occurs). With
                  - link "barmerge.gaps_off" [ref=e21473] [cursor=pointer]:
                    - /url: "#const_barmerge.gaps_off"
                  - text: ", what would otherwise be gaps are filled with the latest known value returned, avoiding"
                  - link "na" [ref=e21474] [cursor=pointer]:
                    - /url: "#var_na"
