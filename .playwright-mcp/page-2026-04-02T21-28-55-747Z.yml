                - generic [ref=e29789]: This keyword allows the creation of an enumeration, enum for short. Enums are unique constructs that hold groups of predefined constants.
                - generic [ref=e29790]:
                  - text: Each field in an enum has a
                  - code [ref=e29791]: const string
                  - text: title. Scripts can access the fields in an enum using dot notation, similar to accessing the fields of a user-defined type.
                - generic [ref=e29792]:
                  - text: Each field represents a value of the
                  - code [ref=e29793]: enumName
                  - text: enum. Scripts can declare each field in an
                  - code [ref=e29794]: enum
                  - text: with an optional
                  - code [ref=e29795]: const string
                  - text: title. If a field's title is not specified, its title is the string representation of its name. Use
                  - link "str.tostring()" [ref=e29796] [cursor=pointer]:
                    - /url: "#fun_str.tostring"
                  - text: on an enum field to retrieve its title.
                - generic [ref=e29797]: Syntax
                - generic [ref=e29798]: "[export ]enum <enumName> <field_1> [= <title_1>] <field_2> [= <title_2>] ... <field_N> [= <title_N>]"
                - generic [ref=e29799]:
                  - text: One can use an enum to quickly create a dropdown input with the help of the
                  - link "input.enum()" [ref=e29800] [cursor=pointer]:
                    - /url: "#fun_input.enum"
                  - text: function. The options that appear in the dropdown represent the titles of the enum fields.
