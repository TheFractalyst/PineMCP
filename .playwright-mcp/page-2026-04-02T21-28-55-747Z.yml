                - generic [ref=e25551]: Arnaud Legoux Moving Average. It uses Gaussian distribution as weights for moving average.
                - generic [ref=e25552]: Syntax
                - generic [ref=e25553]: ta.alma(series, length, offset, sigma, floor) → series float
                - generic [ref=e25554]: Arguments
                - generic [ref=e25555]: series (series int/float) Series of values to process.
                - generic [ref=e25556]: length (series int) Number of bars (length).
                - generic [ref=e25557]: offset (simple int/float) Controls tradeoff between smoothness (closer to 1) and responsiveness (closer to 0).
                - generic [ref=e25558]: sigma (simple int/float) Changes the smoothness of ALMA. The larger sigma the smoother ALMA.
                - generic [ref=e25559]: floor (simple bool) An optional parameter. Specifies whether the offset calculation is floored before ALMA is calculated. Default value is false.
                - generic [ref=e25560]:
                  - generic [ref=e25561]: Example
                  - button [ref=e25562]:
                    - img [ref=e25563]
                - code [ref=e25566]:
                  - generic [ref=e25567]: //@version=6
                  - generic [ref=e25568]: indicator("ta.alma", overlay=true)
                  - generic [ref=e25569]: plot(ta.alma(close, 9, 0.85, 6))
                  - generic [ref=e25570]: // same on pine, but much less efficient
                  - generic [ref=e25571]: pine_alma(series, windowsize, offset, sigma) =>
                  - generic [ref=e25572]: m = offset * (windowsize - 1)
                  - generic [ref=e25573]: //m = math.floor(offset * (windowsize - 1)) // Used as m when math.floor=true
                  - generic [ref=e25574]: s = windowsize / sigma
                  - generic [ref=e25575]: norm = 0.0
                  - generic [ref=e25576]: sum = 0.0
                  - generic [ref=e25577]: for i = 0 to windowsize - 1
