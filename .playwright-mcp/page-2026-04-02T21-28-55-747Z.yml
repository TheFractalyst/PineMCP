                - generic [ref=e31277]:
                  - text: The
                  - code [ref=e31278]: series
                  - text: keyword explicitly assigns the "series" type qualifier to variables and function parameters. Variables and parameters that use the "series" qualifier can reference values that change throughout a script's execution.
                - generic [ref=e31279]:
                  - text: Explicit use of the
                  - code [ref=e31280]: series
                  - text: keyword when declaring the parameters of a library's exported functions is typically unnecessary, as the compiler can usually automatically detect whether a parameter is compatible with "series" or "simple" qualified values. By default, all exported function parameters are qualified as "series" wherever possible.
                - generic [ref=e31281]: In variable declarations, the compiler can usually infer the qualified type automatically based on the values assigned to a variable, and it can automatically change a variable's qualifier to a stronger one when necessary. The type qualifier hierarchy is "const" < "input" < "simple" < "series", where "series" is the strongest.
                - generic [ref=e31282]:
                  - text: Explicitly declaring a variable with the
                  - code [ref=e31283]: series
                  - text: keyword restricts the type qualifier to "series", meaning the script cannot pass its value to any variable or function parameter that requires a value with a weaker qualifier ("const", "input", or "simple").
                - generic [ref=e31284]: When using this keyword to specify the type qualifier, one must also use a type keyword to declare the allowed type.
