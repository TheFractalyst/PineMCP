                - code [ref=e29807]:
                  - generic [ref=e29808]: //@version=6
                  - generic [ref=e29809]: indicator("Session highlight", overlay = true)
                  - generic [ref=e29810]: //@enum Contains fields with popular timezones as titles.
                  - generic [ref=e29811]: //@field exch Has an empty string as the title to represent the chart timezone.
                  - generic [ref=e29812]: enum tz
                  - generic [ref=e29813]: utc = "UTC"
                  - generic [ref=e29814]: exch = ""
                  - generic [ref=e29815]: ny = "America/New_York"
                  - generic [ref=e29816]: chi = "America/Chicago"
                  - generic [ref=e29817]: lon = "Europe/London"
                  - generic [ref=e29818]: tok = "Asia/Tokyo"
                  - generic [ref=e29819]: //@variable The session string.
                  - generic [ref=e29820]: selectedSession = input.session("1200-1500", "Session")
                  - generic [ref=e29821]: "//@variable The selected timezone. The input's dropdown contains the fields in the `tz` enum."
