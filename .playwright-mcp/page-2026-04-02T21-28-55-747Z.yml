                  - text: The
                  - code [ref=e30935]: const
                  - text: keyword explicitly assigns the "const" type qualifier to variables and the parameters of non-exported functions. Variables and parameters with the "const" qualifier reference values established at compile time that never change in the script's execution.
                - generic [ref=e30936]: In variable declarations, the compiler can usually infer the qualified type automatically based on the values assigned to a variable, and it can automatically change a variable's qualifier to a stronger one when necessary. The type qualifier hierarchy is "const" < "input" < "simple" < "series", where "const" is the weakest.
                - generic [ref=e30937]:
                  - text: Explicitly declaring a variable with the
                  - code [ref=e30938]: const
                  - text: keyword restricts the type qualifier to "const", meaning the variable cannot accept a value with a stronger qualifier (e.g., "input"), nor can the value assigned to the variable change at any point in the script's execution.
                - generic [ref=e30939]: When using this keyword to specify the type qualifier, one must also use a type keyword to declare the allowed type.
