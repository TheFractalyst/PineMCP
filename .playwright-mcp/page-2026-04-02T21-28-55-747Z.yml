                  - code [ref=e29923]: from_num
                  - text: ) to the final value (
                  - code [ref=e29924]: to_num
                  - text: ) by a fixed amount (
                  - code [ref=e29925]: step_num
                  - text: ) after each iteration. The last possible iteration occurs when the variable's value reaches the
                  - code [ref=e29926]: to_num
