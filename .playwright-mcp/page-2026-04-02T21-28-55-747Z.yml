              - generic [ref=e9981]:
                - generic [ref=e9982]:
                  - heading "alert()" [level=3] [ref=e9984]
                  - button "Copy link" [ref=e9985]:
                    - img [ref=e9986]
                - generic [ref=e9990]: Creates an alert trigger for an indicator or strategy, with a specified frequency, when called on the latest realtime bar. To activate alerts for a script containing calls to this function, open the "Create Alert" dialog box, then select the script name and "Any alert() function call" in the "Condition" section.
                - generic [ref=e9991]: Syntax
                - generic [ref=e9992]: alert(message, freq) → void
                - generic [ref=e9993]: Arguments
                - generic [ref=e9994]: message (series string) The message to send when the alert occurs.
                - generic [ref=e9995]:
                  - text: "freq (input string) Optional. Determines the allowed frequency of the alert trigger. Possible values are:"
                  - link "alert.freq_all" [ref=e9996] [cursor=pointer]:
                    - /url: "#const_alert.freq_all"
                  - text: (allows an alert on any realtime update),
                  - link "alert.freq_once_per_bar" [ref=e9997] [cursor=pointer]:
                    - /url: "#const_alert.freq_once_per_bar"
                  - text: (allows an alert only on the first execution for each realtime bar), or
                  - link "alert.freq_once_per_bar_close" [ref=e9998] [cursor=pointer]:
                    - /url: "#const_alert.freq_once_per_bar_close"
                  - text: (allows an alert only when a realtime bar closes). The default is
                  - link "alert.freq_once_per_bar" [ref=e9999] [cursor=pointer]:
                    - /url: "#const_alert.freq_once_per_bar"
                  - text: .
                - generic [ref=e10000]:
                  - generic [ref=e10001]: Example
                  - button [ref=e10002]:
                    - img [ref=e10003]
                - code [ref=e10006]:
                  - generic [ref=e10007]: //@version=6
                  - generic [ref=e10008]: "indicator(\"`alert()` example\", \"\", true)"
                  - generic [ref=e10009]: ma = ta.sma(close, 14)
                  - generic [ref=e10010]: xUp = ta.crossover(close, ma)
                  - generic [ref=e10011]: if xUp
                  - generic [ref=e10012]: // Trigger the alert the first time a cross occurs during the real-time bar.
                  - generic [ref=e10013]: alert("Price (" + str.tostring(close) + ") crossed over MA (" + str.tostring(ma) + ").", alert.freq_once_per_bar)
                  - generic [ref=e10014]: plot(ma)
                  - generic [ref=e10015]: plotchar(xUp, "xUp", "▲", location.top, size = size.tiny)
                - generic [ref=e10016]: Remarks
                - generic [ref=e10017]:
                  - text: The
                  - code [ref=e10018]: alert()
                  - text: function does not display information on the chart.
                - generic [ref=e10019]:
                  - text: In contrast to
                  - link "alertcondition()" [ref=e10020] [cursor=pointer]:
                    - /url: "#fun_alertcondition"
                  - text: ", calls to this function do not count toward a script's plot count. Additionally,"
                  - code [ref=e10021]: alert()
                  - text: calls are allowed in local scopes, including the scopes of exported library functions.
                - generic [ref=e10022]:
                  - text: See
                  - link "this article" [ref=e10023] [cursor=pointer]:
                    - /url: https://www.tradingview.com/chart/?solution=43000597494
                  - text: in our Help Center to learn more about activating alerts from
                  - code [ref=e10024]: alert()
                  - text: calls.
                - generic [ref=e10025]: See also
                - link "alertcondition()" [ref=e10027]:
                  - /url: "#fun_alertcondition"
              - generic [ref=e10029]:
                - generic [ref=e10030]:
                  - heading "alertcondition()" [level=3] [ref=e10032]
                  - button "Copy link" [ref=e10033]:
                    - img [ref=e10034]
                - generic [ref=e10038]:
                  - text: Creates alert condition, that is available in Create Alert dialog. Please note, that
                  - link "alertcondition()" [ref=e10039] [cursor=pointer]:
                    - /url: "#fun_alertcondition"
                  - text: does NOT create an alert, it just gives you more options in Create Alert dialog. Also,
                  - link "alertcondition()" [ref=e10040] [cursor=pointer]:
                    - /url: "#fun_alertcondition"
                  - text: effect is invisible on chart.
                - generic [ref=e10041]: Syntax
                - generic [ref=e10042]: alertcondition(condition, title, message) → void
                - generic [ref=e10043]: Arguments
